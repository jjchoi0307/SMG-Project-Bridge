<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SMG Bridge — Caregiver</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css');

/* ══════════════════════════════════════════════════════════════
   TOKENS — Direction B + Caregiver status tones (§0.2)
══════════════════════════════════════════════════════════════ */
:root {
  --b-paper:         #FAF6EF;
  --b-paper-deep:    #F2ECE0;
  --b-ivory:         #FDFAF3;
  --b-ink:           #1A1814;
  --b-ink-2:         #3B3830;
  --b-ink-3:         #6B675C;
  --b-ink-4:         #A29D90;
  --b-rule:          #E5DFD0;
  --b-card:          #FFFFFF;
  --b-emerald:       #2B7A48;
  --b-emerald-deep:  #1C5430;
  --b-emerald-soft:  #E6EFD8;
  --b-peach:         #E8A87C;
  --b-peach-soft:    #F7E3D1;
  --b-plum:          #7B3B5C;
  --b-amber:         #C68A3D;
  --b-amber-soft:    #F5E6C8;
  --b-danger:        #A13525;
  --b-danger-soft:   #F2DCD5;

  /* Caregiver status tones */
  --cg-ok:           #5C8A5F;
  --cg-watch:        #C28E3B;
  --cg-attn:         #B94A3B;
  --cg-ok-soft:      #E7EFE3;
  --cg-watch-soft:   #FAECD7;
  --cg-attn-soft:    #FDECE8;
  --cg-attn-tile:    #FBE6E0;
  --cg-warm:         #F7E3D1;

  --font-sans-b:    'Pretendard Variable', 'IBM Plex Sans', -apple-system, sans-serif;
  --font-display-b: 'Fraunces', Georgia, serif;
  --font-mono:      'IBM Plex Mono', ui-monospace, monospace;
  --font-kr:        'Pretendard Variable', Pretendard, -apple-system, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
html { background: #B4AFA6; }
body {
  font-family: var(--font-sans-b);
  background: #B4AFA6;
  color: var(--b-ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 24px 20px;
  animation: pageIn 220ms ease-out;
}
@keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }
@media (prefers-reduced-motion: reduce) { body { animation: none; } }
/* Fill the phone viewport cleanly on real phones */
@media (max-width: 480px) { html { background: var(--b-paper); } }

.tt-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* ══ iPhone frame ══ */
.phone {
  width: 393px;
  height: 852px;
  background: var(--b-paper);
  border-radius: 44px;
  overflow: hidden;
  box-shadow:
    0 30px 80px -20px rgba(0,0,0,0.2),
    inset 0 0 0 1px rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  position: relative;
  isolation: isolate;
}

.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 44px;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  font-family: var(--font-sans-b);
  font-size: 15px;
  font-weight: 600;
  color: var(--b-ink);
  pointer-events: none;
  background: linear-gradient(to bottom, rgba(250,246,239,0.85), rgba(250,246,239,0));
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.status-bar-right { display: flex; align-items: center; gap: 6px; }

/* ══ Screen / panes ══ */
.screen {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 96px;
  position: relative;
}
.screen::-webkit-scrollbar { display: none; }
.pane { display: none; }
.pane.active {
  display: block;
  animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ══ CgHeader (§4) ══ */
.cg-header {
  padding: 56px 20px 18px;
  background: linear-gradient(180deg, #EAF2E6 0%, var(--b-paper) 100%);
  border-bottom: 1px solid var(--b-rule);
}
.cg-header.peach { background: linear-gradient(180deg, var(--cg-warm) 0%, var(--b-paper) 100%); }
.cg-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.cg-header-left { display: flex; align-items: center; gap: 8px; }
.cg-back {
  font-size: 24px;
  line-height: 1;
  color: var(--b-ink-2);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
  font-family: inherit;
}
.cg-brand {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--b-ink-3);
}
.cg-title {
  font-family: var(--font-display-b);
  font-size: 30px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--b-ink);
}
.cg-sub {
  font-size: 13px;
  color: var(--b-ink-3);
  margin-top: 6px;
  font-family: var(--font-mono);
}

/* Language toggle */
.lang-toggle {
  display: flex;
  border: 1px solid var(--b-rule);
  border-radius: 18px;
  overflow: hidden;
  background: #fff;
}
.lang-toggle button {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  background: transparent;
  color: var(--b-ink-3);
  border: none;
  cursor: pointer;
  font-family: var(--font-kr);
  line-height: 1.3;
}
.lang-toggle button.active {
  background: var(--b-emerald-deep);
  color: #fff;
}

/* ══ Tab bar (§2) ══ */
.tab-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--b-rule);
  padding: 10px 0 28px;
  display: flex;
  z-index: 5;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 0 4px;
  background: transparent;
  border: none;
  font-family: inherit;
}
.tab-icon {
  width: 26px; height: 26px;
  border-radius: 7px;
  display: grid; place-items: center;
  font-size: 14px;
  background: var(--b-rule);
  color: var(--b-ink-3);
  opacity: 0.55;
  font-family: var(--font-display-b);
}
.tab-item.active .tab-icon {
  background: var(--b-emerald-deep);
  color: #fff;
  opacity: 1;
}
.tab-label-ko {
  font-family: var(--font-kr);
  font-size: 11px;
  font-weight: 600;
  color: var(--b-ink-3);
  line-height: 1;
}
.tab-item.active .tab-label-ko { color: var(--b-emerald-deep); }
.tab-label-en {
  font-size: 9px;
  font-weight: 500;
  color: var(--b-ink-4);
  letter-spacing: 0.03em;
  line-height: 1;
  margin-top: 1px;
}
.tab-item.active .tab-label-en { color: var(--b-emerald-deep); opacity: 0.7; }

/* ══ Call Mom FAB (§3) ══ */
.fab {
  position: absolute;
  bottom: 92px;
  right: 20px;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 10px;
}
.fab.hidden { display: none; }
.fab-label {
  background: #fff;
  border: 1px solid var(--b-rule);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--b-ink-2);
  box-shadow: 0 6px 16px -4px rgba(0,0,0,0.1);
}
.fab-btn {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: none;
  background: var(--b-emerald-deep);
  color: #fff;
  font-size: 24px;
  font-family: var(--font-display-b);
  box-shadow: 0 10px 24px -4px rgba(78,108,80,0.5);
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: transform 0.1s;
}
.fab-btn:active { transform: scale(0.97); }

/* ══ StatusChip (§5) ══ */
.status-chip {
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 82px;
}
.status-chip.ok    { background: var(--cg-ok-soft); }
.status-chip.watch { background: var(--cg-watch-soft); }
.status-chip.attn  { background: var(--cg-attn-soft); }
.status-chip-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  opacity: 0.85;
}
.status-chip.ok    .status-chip-label { color: var(--cg-ok); }
.status-chip.watch .status-chip-label { color: var(--cg-watch); }
.status-chip.attn  .status-chip-label { color: var(--cg-attn); }
.status-chip-value {
  font-family: var(--font-display-b);
  font-size: 18px;
  font-weight: 500;
  color: var(--b-ink);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

/* ══ Common cards ══ */
.card {
  background: var(--b-card);
  border-radius: 18px;
  padding: 18px;
  border: 1px solid var(--b-rule);
}
.card.peach { background: var(--cg-warm); border: none; }
.card.attn-tile { background: var(--cg-attn-tile); border: none; }
.card.sage { background: var(--b-emerald-soft); border: none; }
.card.radius-14 { border-radius: 14px; }
.card.radius-16 { border-radius: 16px; }
.card.pad-0 { padding: 0; }

/* ══ Buttons ══ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  min-height: 48px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-sans-b);
  border-radius: 12px;
  border: 1.5px solid var(--b-rule);
  background: #fff;
  color: var(--b-ink);
  cursor: pointer;
  transition: transform 0.08s;
  line-height: 1.2;
  width: 100%;
}
.btn:active { transform: scale(0.99); }
.btn-primary {
  background: var(--b-emerald-deep);
  color: #fff;
  border-color: var(--b-emerald-deep);
  font-weight: 700;
}
.btn-attn {
  background: var(--cg-attn);
  color: #fff;
  border-color: var(--cg-attn);
  font-weight: 700;
}
.btn-outline-primary {
  background: #fff;
  color: var(--b-emerald-deep);
  border: 1.5px solid var(--b-emerald-deep);
  font-weight: 700;
}
.btn-dashed-primary {
  background: transparent;
  color: var(--b-emerald-deep);
  border: 1.5px dashed var(--b-emerald-deep);
  font-weight: 700;
}

/* ══ Sticky action bar (used in flows) ══ */
.sticky-bar {
  position: absolute;
  bottom: 84px; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--b-rule);
  padding: 16px 20px;
  z-index: 10;
}
.sticky-bar.cols-2 {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 10px;
}
.sticky-bar .btn { padding: 16px; min-height: 52px; border-radius: 14px; }

/* ══ Activity timeline ══ */
.tl-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--b-rule-soft, #EDE8DC);
}
.tl-row:last-child { border-bottom: none; }
.tl-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--b-ink-3);
  width: 58px;
  flex-shrink: 0;
  padding-top: 2px;
}
.tl-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
  margin-top: 6px;
}
.tl-body { flex: 1; font-size: 14px; color: var(--b-ink); }

/* ══ Toast ══ */
.toast-wrap {
  position: absolute;
  bottom: 104px; left: 20px; right: 20px;
  z-index: 130;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}
.toast {
  background: var(--b-ink);
  color: var(--b-ivory);
  padding: 14px 18px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: toast-in 0.2s ease-out;
  pointer-events: auto;
}
.toast.ok { background: var(--b-emerald-deep); }
.toast.err { background: var(--cg-attn); }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ══ Radio/toggle ══ */
.radio-circle {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--b-rule);
  background: #fff;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
}
.radio-circle.sel {
  background: var(--b-emerald-deep);
  border-color: var(--b-emerald-deep);
}
.toggle {
  width: 44px; height: 26px;
  border-radius: 14px;
  background: var(--b-rule);
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}
.toggle.on { background: var(--b-emerald-deep); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  transition: left 0.2s;
}
.toggle.on .toggle-knob { left: 21px; }

/* Empty / Loading / Error (reused patterns from patient) */
.state-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  text-align: center;
  gap: 16px;
  min-height: 460px;
}
.state-glyph {
  width: 88px; height: 88px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-family: var(--font-display-b);
  font-size: 38px;
}
.state-glyph.sage { background: var(--b-emerald-soft); color: var(--b-emerald-deep); }
.state-glyph.danger { background: #FDECE8; color: var(--b-danger); }
.state-title {
  font-family: var(--font-display-b);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.25;
}
.state-body {
  font-size: 15px;
  color: var(--b-ink-3);
  line-height: 1.55;
  max-width: 300px;
}

/* Loading skeleton */
.skel-card {
  background: var(--b-card);
  border-radius: 18px;
  padding: 18px;
  border: 1px solid var(--b-rule);
  margin-bottom: 14px;
}
.skel-bar {
  height: 14px;
  width: 40%;
  background: #F0EDE3;
  border-radius: 4px;
  margin-bottom: 10px;
}
.skel-bar.thin { height: 10px; width: 70%; background: #F5F2E8; margin-bottom: 6px; }
.skel-bar.short { width: 55%; }

/* Home bar (iOS indicator) */
.home-bar {
  position: absolute;
  bottom: 8px; left: 0; right: 0;
  display: flex;
  justify-content: center;
  pointer-events: none;
  z-index: 20;
}
.home-bar div {
  width: 134px;
  height: 5px;
  border-radius: 5px;
  background: rgba(0,0,0,0.25);
}

/* Helpers */
.vstack { display: flex; flex-direction: column; gap: 10px; }
.hstack { display: flex; align-items: center; gap: 10px; }
.flex-1 { flex: 1; }

/* ══════════════════════════════════════════════════════════════
   SIGN-IN FLOW — Caregiver (welcome → invite → OTP → biometric)
══════════════════════════════════════════════════════════════ */
.signin {
  position: absolute;
  inset: 0;
  z-index: 150;
  display: none;
  flex-direction: column;
  overflow: hidden;
  background: var(--b-paper);
}
.signin.open { display: flex; }

.si-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  /* No enter animation between sign-in screens — the warm paper behind .si-page
     showed through during the opacity fade, reading as a "white flash." */
}

.si-welcome-bg,
.si-biometric-bg {
  position: absolute; inset: 0;
  z-index: 0;
  pointer-events: none;
}
.si-welcome-bg {
  background: linear-gradient(180deg, #EAF2E6 0%, #F4EDD9 55%, var(--b-paper) 100%);
}
.si-biometric-bg {
  background: linear-gradient(180deg, #EAF2E6 0%, var(--b-paper) 60%, var(--b-paper) 100%);
}

.si-top {
  position: absolute;
  top: 56px; left: 0; right: 0;
  height: 36px;
  padding: 0 20px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 5;
}
.si-a11y { display: flex; gap: 6px; }
.si-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: #fff;
  border: 1px solid var(--b-rule);
  border-radius: 18px;
  font-size: 11px;
  font-weight: 600;
  color: var(--b-ink-3);
  cursor: pointer;
  font-family: var(--font-sans-b);
}
.si-pill .si-pill-back {
  font-size: 14px;
  line-height: 1;
  margin-right: 1px;
}

.si-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 116px 28px 28px;
  position: relative;
  z-index: 2;
  overflow-y: auto;
}
.si-body::-webkit-scrollbar { display: none; }

.si-mark {
  width: 92px; height: 92px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, var(--b-emerald-soft) 0%, #EAF2E6 60%, #DCE8D9 100%);
  display: grid; place-items: center;
  font-family: var(--font-display-b);
  font-size: 29px; font-weight: 500; color: var(--b-emerald-deep);
  letter-spacing: -0.02em;
  line-height: 1;
  box-shadow:
    inset 0 -6px 20px -10px rgba(78,108,80,.3),
    0 10px 30px -12px rgba(78,108,80,.35);
}
.si-crescent { display: block; margin-top: 14px; }

.si-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--b-ink-3);
  margin-top: 10px;
  text-align: center;
}
.si-title {
  font-family: var(--font-display-b);
  font-size: 34px;
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1.1;
  white-space: pre-line;
  color: var(--b-ink);
}
.si-sub {
  font-size: 15px;
  color: var(--b-ink-3);
  line-height: 1.55;
  max-width: 320px;
  margin-top: 14px;
}

/* Mom identity reassurance card (caregiver-only) */
.si-mom-card {
  margin-top: 28px;
  padding: 14px 16px;
  background: #fff;
  border: 1px solid var(--b-rule);
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05);
}
.si-mom-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--b-emerald-soft);
  color: var(--b-emerald-deep);
  display: grid; place-items: center;
  font-family: var(--font-display-b);
  font-size: 20px; font-weight: 600;
  flex-shrink: 0;
}
.si-mom-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--b-ink-3);
}
.si-mom-name {
  font-family: var(--font-display-b);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-top: 2px;
}

/* Role cards (welcome picker) */
.si-role {
  background: #fff;
  border: 1.5px solid var(--b-rule);
  border-radius: 18px;
  padding: 20px 22px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  box-shadow: 0 4px 12px -4px rgba(0,0,0,.05);
  transition: all 0.12s;
  width: 100%;
  font-family: inherit;
  text-align: left;
  color: inherit;
}
.si-role:active { transform: scale(0.99); }
.si-role-ico {
  width: 44px; height: 44px;
  border-radius: 14px;
  background: var(--b-emerald-soft);
  color: var(--b-emerald-deep);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  flex-shrink: 0;
}
.si-role-body { flex: 1; }
.si-role-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  line-height: 1.2;
}
.si-role-sub {
  font-size: 12.5px;
  color: var(--b-ink-3);
  margin-top: 3px;
}
.si-role-chev {
  font-size: 22px;
  opacity: 0.6;
}

/* Invite code slots */
.si-code-row {
  display: flex;
  gap: 8px;
  justify-content: space-between;
  margin-top: 8px;
}
.si-code-slot {
  flex: 1;
  aspect-ratio: 0.85;
  max-width: 48px;
  border-radius: 10px;
  border: 2px solid var(--b-rule);
  background: var(--b-paper-deep);
  display: grid; place-items: center;
  font-family: var(--font-display-b);
  font-size: 24px; font-weight: 500;
  color: var(--b-ink);
  text-transform: uppercase;
}
.si-code-slot.filled {
  border-color: var(--b-emerald-deep);
  background: #fff;
}

/* OTP slots */
.si-otp-row {
  display: flex; gap: 8px;
  justify-content: space-between;
}
.si-otp-digit {
  flex: 1;
  aspect-ratio: 1;
  max-width: 48px;
  border-radius: 12px;
  border: 2px solid var(--b-rule);
  background: var(--b-paper-deep);
  display: grid; place-items: center;
  font-family: var(--font-display-b);
  font-size: 28px; font-weight: 500;
  color: var(--b-ink);
}
.si-otp-digit.filled {
  border-color: var(--b-emerald-deep);
  background: #fff;
}
.si-otp-empty-bar {
  width: 10px; height: 2px;
  background: var(--b-rule);
  border-radius: 1px;
}

.si-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  max-width: 340px;
  margin: 0 auto;
}
.si-key {
  height: 54px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid var(--b-rule);
  display: grid; place-items: center;
  font-family: var(--font-display-b);
  font-size: 24px; font-weight: 500;
  color: var(--b-ink);
  cursor: pointer;
}
.si-key:active { background: var(--b-emerald-soft); }
.si-key.blank { background: transparent; border: none; pointer-events: none; }

/* Face ID */
.si-face-box {
  position: relative;
  width: 120px; height: 120px;
  margin: 0 auto 28px;
  pointer-events: none;
}
.si-face-frame {
  position: absolute; inset: 0;
  border-radius: 24px;
}
.si-face-frame::before,
.si-face-frame::after,
.si-face-frame > span::before,
.si-face-frame > span::after {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  border-color: var(--b-emerald-deep);
  border-style: solid;
  border-width: 3px;
}
.si-face-frame::before { top: 0; left: 0; border-right: 0; border-bottom: 0; border-top-left-radius: 20px; }
.si-face-frame::after  { top: 0; right: 0; border-left: 0; border-bottom: 0; border-top-right-radius: 20px; }
.si-face-frame > span::before { bottom: 0; left: 0; border-right: 0; border-top: 0; border-bottom-left-radius: 20px; }
.si-face-frame > span::after  { bottom: 0; right: 0; border-left: 0; border-top: 0; border-bottom-right-radius: 20px; }

.si-foot {
  padding: 0 28px 28px;
  background: var(--b-paper);
  position: relative;
  z-index: 3;
}
.si-btn-primary {
  width: 100%;
  padding: 20px;
  min-height: 60px;
  border-radius: 16px;
  border: none;
  background: var(--b-emerald-deep);
  color: #fff;
  font-size: 17px; font-weight: 700;
  font-family: var(--font-sans-b);
  cursor: pointer;
  box-shadow: 0 12px 26px -8px rgba(78,108,80,.5);
}
.si-btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  background: var(--b-ink);
}
.si-btn-text {
  width: 100%;
  padding: 14px 18px;
  background: transparent;
  border: none;
  color: var(--b-emerald-deep);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans-b);
}
.si-footnote {
  text-align: center;
  font-size: 11px;
  color: var(--b-ink-3);
  line-height: 1.5;
  padding: 14px 14px 0;
  font-family: var(--font-mono);
}

.si-otp-foot {
  display: flex; justify-content: center; gap: 18px;
  font-size: 12px; color: var(--b-ink-3); font-weight: 600;
  padding-top: 10px;
}

/* Demo panel — body-level, desktop only */
.demo-panel {
  position: fixed;
  bottom: 24px;
  left: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 200;
}
.demo-btn {
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid var(--b-rule);
  border-radius: 10px;
  padding: 7px 12px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--b-ink-2);
  cursor: pointer;
  letter-spacing: 0.04em;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 4px 12px -4px rgba(0,0,0,0.1);
  text-align: left;
  min-width: 140px;
}
.demo-btn:hover { background: #fff; border-color: var(--b-ink-4); }
.demo-btn .demo-btn-k {
  font-family: var(--font-sans-b);
  font-weight: 600;
  color: var(--b-ink-3);
  margin-right: 4px;
}

/* Below 480px, full screen — demo panel hidden */
@media (max-width: 480px) {
  body { padding: 0; background: var(--b-paper); align-items: stretch; }
  .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  .status-bar { display: none; }
  .demo-panel { display: none; }
}
</style>
</head>

<script>
/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
const STATE = {
  lang: (localStorage.getItem('smg-cg-lang') || 'ko'),
  tab: 'home',
  flow: null,         // 'refill' | 'remind' | 'prep' | 'compose' | null
  mood: 'ok',         // 'ok' | 'watch' | 'attn'
  data: 'populated',  // 'populated' | 'empty' | 'loading' | 'error'

  // Scope consent — what Mom granted Jennifer
  scopes: { meds: true, visits: true, labs: true, messages: true },

  // Flow-local state
  refill: { pickup: 'tomorrow-am', notify: true },
  remind: { method: 'app', note: '' },
  prep: { questions: [
    {ko:'혈압 약을 바꿀 수 있을까요?', en:"Can we revisit her blood pressure medication?"},
    {ko:'어머니가 밤에 잠을 잘 못 주무세요', en:"Mom's having trouble sleeping at night"},
  ]},
  compose: { to: 'dr-park', body: '' },
};

/* ══════════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════════ */
function lang(o) {
  if (typeof o === 'string') return o;
  if (!o) return '';
  return o[STATE.lang] != null ? o[STATE.lang] : '';
}
function escape(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function isKo() { return STATE.lang === 'ko'; }

// Bilingual text helper: returns a span with both, using proper font
function bi(ko, en) {
  return isKo() ? escape(ko) : escape(en);
}

/* ══════════════════════════════════════════════════════════════
   LANG TOGGLE
══════════════════════════════════════════════════════════════ */
function langToggle() {
  return `
    <div class="lang-toggle">
      <button class="${isKo()?'active':''}" onclick="setLang('ko')">한국어</button>
      <button class="${!isKo()?'active':''}" onclick="setLang('en')">EN</button>
    </div>
  `;
}
function setLang(l) {
  STATE.lang = l;
  localStorage.setItem('smg-cg-lang', l);
  document.documentElement.lang = (l === 'ko' ? 'ko' : 'en');
  document.getElementById('fabLabel').textContent = isKo() ? '어머니께 전화' : 'Call Mom';
  renderCurrent();
}

/* ══════════════════════════════════════════════════════════════
   CgHeader (§4)
══════════════════════════════════════════════════════════════ */
function cgHeader({ title, subtitle, onBack, peach }) {
  return `
    <div class="cg-header ${peach?'peach':''}">
      <div class="cg-header-top">
        <div class="cg-header-left">
          ${onBack ? `<button class="cg-back" onclick="${onBack}">‹</button>` : ''}
          <div class="cg-brand">${isKo()?'SMG 브릿지 · 보호자':'SMG BRIDGE · CAREGIVER'}</div>
        </div>
        ${langToggle()}
      </div>
      <div class="cg-title">${escape(title)}</div>
      ${subtitle ? `<div class="cg-sub">${escape(subtitle)}</div>` : ''}
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   StatusChip (§5)
══════════════════════════════════════════════════════════════ */
function statusChip({ label, value, tone }) {
  return `
    <div class="status-chip ${tone}">
      <div class="status-chip-label">${escape(label)}</div>
      <div class="status-chip-value">${escape(value)}</div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   ROUTING
══════════════════════════════════════════════════════════════ */
const RENDERERS = {};

function showTab(name) {
  STATE.tab = name;
  STATE.flow = null;
  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  const pane = document.getElementById('pane-' + name);
  if (pane) pane.classList.add('active');
  document.getElementById('screen').scrollTop = 0;
  renderCurrent();
  updateFab();
}

function renderCurrent() {
  const r = RENDERERS[STATE.tab];
  if (!r) return;
  const html = r();
  const pane = document.getElementById('pane-' + STATE.tab);
  if (pane) pane.innerHTML = html;
}

function updateFab() {
  const fab = document.getElementById('fab');
  const hide = STATE.flow != null || STATE.data === 'loading' || STATE.data === 'error' ||
               (STATE.tab === 'home' && STATE.data === 'empty');
  fab.classList.toggle('hidden', !!hide);
}

function goBack() {
  STATE.flow = null;
  renderCurrent();
  updateFab();
}

function callMom() {
  showToast(isKo() ? '어머니께 전화 거는 중…' : 'Calling Mom…', 'ok');
}

function showToast(msg, tone='ok') {
  const wrap = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + tone;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 3800);
}

/* ══════════════════════════════════════════════════════════════
   Demo helpers
══════════════════════════════════════════════════════════════ */
function cycleMood() {
  const order = ['ok','watch','attn'];
  STATE.mood = order[(order.indexOf(STATE.mood) + 1) % 3];
  document.getElementById('moodLabel').textContent = STATE.mood;
  renderCurrent();
}

/* ══════════════════════════════════════════════════════════════
   HOME TAB (§6) — three moods
══════════════════════════════════════════════════════════════ */
RENDERERS.home = function() {
  if (STATE.data === 'empty')   return renderHomeEmpty();
  if (STATE.data === 'loading') return renderHomeLoading();
  if (STATE.data === 'error')   return renderHomeError();
  return renderHomePopulated();
};

function renderHomePopulated() {
  const mood = STATE.mood;
  const ko = isKo();

  const answer = ({
    ok:    {ko:'어머니 괜찮으세요',    en:"Mom's doing well today"},
    watch: {ko:'살펴볼 점이 있어요',    en:'A couple things to notice'},
    attn:  {ko:'확인이 필요해요',        en:'Please check in on Mom'},
  })[mood];

  const sub = ({
    ok:    {ko:'마지막 활동 · 4분 전',   en:'Last active · 4 min ago'},
    watch: {ko:'마지막 활동 · 42분 전',  en:'Last active · 42 min ago'},
    attn:  {ko:'마지막 활동 · 3시간 전', en:'Last active · 3 hours ago'},
  })[mood];

  const gradient = ({
    ok:    'linear-gradient(170deg, #D9ECD9 0%, var(--b-emerald-soft) 40%, var(--b-paper) 100%)',
    watch: 'linear-gradient(170deg, #FAECD7 0%, var(--cg-warm) 50%, var(--b-paper) 100%)',
    attn:  'linear-gradient(170deg, #F7D8D0 0%, #FBE6E0 50%, var(--b-paper) 100%)',
  })[mood];

  // Status chips (§6.3)
  const chips = {
    ok: [
      {label: ko?'오늘 약':'Meds today', value: ko?'모두 복용':'All taken', tone:'ok'},
      {label: ko?'기분':'Mood',         value: ko?'좋아요':'Good',         tone:'ok'},
      {label: ko?'혈압':'Blood pressure', value: '128/78', tone:'ok'},
      {label: ko?'다음 진료':'Next visit', value: ko?'10일 후':'In 10 days', tone:'ok'},
    ],
    watch: [
      {label: ko?'오늘 약':'Meds today', value: ko?'1개 놓침':'1 dose missed', tone:'watch'},
      {label: ko?'기분':'Mood',         value: ko?'괜찮아요':'Okay',          tone:'watch'},
      {label: ko?'혈압':'Blood pressure', value: ko?'정상':'Normal',          tone:'ok'},
      {label: ko?'다음 진료':'Next visit', value: ko?'10일 후':'In 10 days',   tone:'ok'},
    ],
    attn: [
      {label: ko?'오늘 약':'Meds today', value: ko?'2개 놓침':'2 doses missed', tone:'attn'},
      {label: ko?'기분':'Mood',         value: ko?'힘들어요':'Down',           tone:'attn'},
      {label: ko?'혈압':'Blood pressure', value: ko?'높음 · 148/92':'High · 148/92', tone:'attn'},
      {label: ko?'다음 진료':'Next visit', value: ko?'10일 후':'In 10 days',     tone:'ok'},
    ],
  }[mood];

  // Mood card (§6.4)
  const moodQuote = ({
    ok:    {ko:'"오늘은 기분이 좋아요"',         en:'"I feel good today"'},
    watch: {ko:'"괜찮아요, 조금 피곤해요"',       en:"\"I'm okay, just a little tired\""},
    attn:  {ko:'"오늘은 좀 힘들어요"',            en:'"Feeling down today"'},
  })[mood];

  const moodGlyph = mood==='ok' ? '◠' : mood==='watch' ? '—' : '◡';
  const moodBg = mood==='ok' ? 'var(--b-emerald-soft)' : mood==='watch' ? 'var(--cg-warm)' : '#FBE6E0';
  const moodColor = mood==='ok' ? 'var(--b-emerald-deep)' : mood==='watch' ? 'var(--cg-watch)' : 'var(--cg-attn)';

  // Action panel (§6.5, only shown when mood ≠ ok)
  const actionPanel = mood === 'ok' ? '' : (mood === 'attn' ? `
    <div class="card attn-tile" style="border-radius: 18px; padding: 18px; margin-top: 14px;">
      <div class="tt-label" style="color: var(--b-ink-3); margin-bottom: 10px;">${ko?'할 수 있는 일':'What you can do'}</div>
      <div class="vstack" style="gap: 10px;">
        <button class="btn btn-attn" style="padding: 16px; border-radius: 12px;" onclick="callMom()">☎ ${ko?'어머니께 바로 전화':'Call Mom now'}</button>
        <button class="btn btn-outline-primary" style="padding: 16px; border-radius: 12px;" onclick="openFlow('remind')">${ko?'약 복용 알림 보내기':'Remind to take meds'}</button>
      </div>
    </div>
  ` : `
    <div class="card peach" style="border-radius: 18px; padding: 18px; margin-top: 14px;">
      <div class="tt-label" style="color: var(--b-ink-3); margin-bottom: 10px;">${ko?'할 수 있는 일':'What you can do'}</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn" style="padding: 14px; border-radius: 12px;" onclick="openFlow('remind')">${ko?'약 알림':'Remind meds'}</button>
        <button class="btn btn-primary" style="padding: 14px; border-radius: 12px;" onclick="openFlow('compose')">${ko?'안부 메시지':'Send check-in'}</button>
      </div>
    </div>
  `);

  // Timeline (§6.6)
  const timeline = {
    ok: [
      {time:'8:12 AM', dotColor:'var(--cg-ok)', text: ko?'아침 약 복용 완료':'Morning meds taken'},
      {time:'7:40 AM', dotColor:'var(--cg-ok)', text: ko?'혈압 측정 · 128/78':'BP logged · 128/78'},
      {time:'6:55 AM', dotColor:'var(--b-rule)', text: ko?'기상':'Woke up'},
    ],
    watch: [
      {time:'8:45 AM', dotColor:'var(--cg-watch)', text: ko?'Metformin 놓침 (Lisinopril는 복용)':'Missed Metformin (took Lisinopril)'},
      {time:'7:40 AM', dotColor:'var(--cg-watch)', text: ko?'혈압 측정 · 134/82':'BP logged · 134/82'},
      {time:'6:55 AM', dotColor:'var(--b-rule)', text: ko?'기상':'Woke up'},
    ],
    attn: [
      {time:'—', dotColor:'var(--cg-attn)', text: ko?'아침 약 아직 복용 안 하심':'Morning meds not taken yet'},
      {time:'7:42 AM', dotColor:'var(--cg-attn)', text: ko?'혈압 측정 · 148/92':'BP logged · 148/92'},
      {time:'6:55 AM', dotColor:'var(--b-rule)', text: ko?'기상':'Woke up'},
    ],
  }[mood];

  return `
    <!-- Hero (§6.2) -->
    <div style="padding: 56px 22px 28px; background: ${gradient}; border-bottom: 1px solid var(--b-rule);">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;">
        <div class="cg-brand">${ko?'SMG 브릿지 · 보호자':'SMG BRIDGE · CAREGIVER'}</div>
        ${langToggle()}

STATE.signin = {
  open: false,
  step: 'welcome', // welcome | code | otp | biometric
  code: '',
  otp: '',
  resendTimer: 28,
  resendInt: null,
};

function showSignIn() {
  STATE.signin = { open: true, step: 'welcome', code: '', otp: '', resendTimer: 28, resendInt: null };
  document.getElementById('signin').classList.add('open');
  // Hide tab bar + FAB during sign-in
  document.querySelector('.tab-bar').style.display = 'none';
  document.getElementById('fab').classList.add('hidden');
  renderSignIn();
}
function hideSignIn() {
  STATE.signin.open = false;
  if (STATE.signin.resendInt) { clearInterval(STATE.signin.resendInt); STATE.signin.resendInt = null; }
  document.getElementById('signin').classList.remove('open');
  document.querySelector('.tab-bar').style.display = '';
  updateFab();
  localStorage.setItem('smg-cg-authed', '1');
}

function siTopControls(opts) {
  opts = opts || {};

    <div class="si-top">
      <div class="si-a11y">${left}</div>

function renderSignIn() {
  const step = STATE.signin.step;

  if (step === 'code')      return renderSICode();

}

/* (B) Invite code — 6 characters from Mom */
function renderSICode() {
  const ko = isKo();
  const t = {
    title: ko ? '초대 코드를 입력해 주세요' : 'Enter the invite code',
    sub:   ko ? '어머니께서 앱에서 "가족 초대하기"를 누르면 6자리 코드가 보여요.' : 'Mom will see a 6-character code after tapping "Invite family" in her app.',
    codeL: ko ? '초대 코드' : 'Invite code',
    next:  ko ? '다음' : 'Continue',
    scan:  ko ? 'QR 코드로 연결하기' : 'Connect with QR instead',
    noCode:ko ? '아직 초대받지 못하셨나요?' : "Don't have a code yet?",
    send:  ko ? '어머니께 안내 문자 보내기' : 'Send Mom the instructions',
  };
  const code = STATE.signin.code;
  const slots = Array.from({length: 6}, (_, i) => code[i] || '').map((c, i) => i === 3 && false ? '' : c);
  // 6-slot display
  const renderSlot = (c) => `<div class="si-code-slot ${c?'filled':''}">${c ? escape(c) : ''}</div>`;

  document.getElementById('signin').innerHTML = `
    <div class="si-page">
      ${siTopControls({ back: "STATE.signin.step='welcome';renderSignIn();" })}
      <div class="si-body">
        <div class="si-title" style="font-size: 28px; line-height: 1.2;">${escape(t.title)}</div>
        <div class="si-sub" style="margin-top: 14px; margin-bottom: 24px;">${escape(t.sub)}</div>

        <!-- QR scan shortcut -->
        <div style="padding: 14px 18px; border-radius: 14px; background: #FBE6CE; display: flex; align-items: center; gap: 14px; margin-bottom: 24px; cursor: pointer;" onclick="showToast('${ko?'QR 카메라 준비 중':'QR camera preparing'}','ok')">
          <div style="width: 40px; height: 40px; border-radius: 10px; background: #fff; display: grid; place-items: center; font-size: 18px;">▦</div>
          <div style="flex: 1; font-size: 14px; font-weight: 600;">${escape(t.scan)}</div>
          <div style="font-size: 18px; color: var(--b-ink-3);">›</div>
        </div>

        <div class="tt-label" style="color: var(--b-ink-3); margin-bottom: 8px;">${escape(t.codeL)}</div>
        <div class="si-code-wrap" style="position: relative;" onclick="var f=document.getElementById('si-code-field'); if(f) f.focus();">
          <div class="si-code-row">
            ${slots.map(renderSlot).join('')}
          </div>
          <input id="si-code-field" type="text" inputmode="text" autocomplete="one-time-code"
            autocapitalize="characters" spellcheck="false"
            value="${escape(code)}"
            oninput="onInviteInput(this)"
            maxlength="6"
            style="position: absolute; inset: 0; width: 100%; height: 100%; border: none; outline: none; background: transparent; color: transparent; caret-color: transparent; font-size: 24px; text-align: center; letter-spacing: 1em; padding: 0; margin: 0; -webkit-text-fill-color: transparent;"
          />
        </div>

        <div style="flex: 1; min-height: 20px;"></div>

        <div style="padding: 16px; border-radius: 14px; background: #fff; border: 1px solid var(--b-rule); margin-top: 14px;">
          <div style="font-size: 13px; font-weight: 600;">${escape(t.noCode)}</div>
          <div style="font-size: 13px; color: var(--b-emerald-deep); font-weight: 600; margin-top: 6px; cursor: pointer;" onclick="showToast('${ko?'어머니께 안내를 보냈어요':'Instructions sent to Mom'}','ok')">${escape(t.send)} →</div>
        </div>
      </div>
      <div class="si-foot">
        <button class="si-btn-primary" ${code.length < 6 ? 'disabled' : ''} onclick="siCodeNext()">${escape(t.next)}</button>
      </div>
    </div>
  `;
  setTimeout(() => { const f = document.getElementById('si-code-field'); if (f) f.focus(); }, 20);
}

function onInviteInput(inp) {
  const raw = (inp.value || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
  STATE.signin.code = raw;
  // Sync the input's own value (keeps it canonical without losing focus)
  if (inp.value !== raw) {
    inp.value = raw;
    try { inp.setSelectionRange(raw.length, raw.length); } catch (e) {}
  }
  // Re-render slots in place without losing focus
  const slots = document.querySelectorAll('#signin .si-code-slot');
  slots.forEach((s, i) => {
    const c = raw[i] || '';
    s.textContent = c;
    s.classList.toggle('filled', !!c);
  });
  // Enable primary button
  const btn = document.querySelector('#signin .si-btn-primary');
  if (btn) {
    if (raw.length === 6) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', '');
  }
}

function siCodeNext() {
  if (STATE.signin.code.length < 6) return;
  STATE.signin.step = 'otp';
  STATE.signin.otp = '';
  STATE.signin.resendTimer = 28;
  renderSignIn();
  startResendTimer();
}

/* (C) OTP — 6-digit SMS code */
function renderSIOtp() {
  const ko = isKo();
  const t = {
    title: ko ? '인증 코드를 입력해 주세요' : 'Enter the code we sent',
    sub:   ko ? '등록된 번호로 6자리 코드를 보내드렸어요.' : "We've sent a 6-digit code to your phone.",
    resend:ko ? '코드 다시 받기' : 'Resend code',
    wait:  ko ? `${STATE.signin.resendTimer}초 후에 다시 보낼 수 있어요` : `You can resend in ${STATE.signin.resendTimer}s`,
    help:  ko ? '도움받기' : 'Need help?',
    wrong: ko ? '번호 바꾸기' : 'Wrong number?',
  };
  const otp = STATE.signin.otp;
  const slots = Array.from({length: 6}, (_, i) => otp[i] || '');
  document.getElementById('signin').innerHTML = `
    <div class="si-page">
      ${siTopControls({ back: "STATE.signin.step='code';renderSignIn();" })}
      <div class="si-body">
        <div class="si-title" style="font-size: 28px; line-height: 1.2;">${escape(t.title)}</div>
        <div class="si-sub" style="margin-top: 14px; margin-bottom: 32px;">${escape(t.sub)}</div>

        <div class="si-otp-row">
          ${slots.map(d => `<div class="si-otp-digit ${d?'filled':''}">${d ? escape(d) : '<div class="si-otp-empty-bar"></div>'}</div>`).join('')}
        </div>

        <div class="si-otp-countdown" style="text-align: center; margin-top: 22px; margin-bottom: 6px; font-size: 13px; color: var(--b-ink-3);">
          ${STATE.signin.resendTimer > 0 ? escape(t.wait) : ''}
        </div>
        <button class="si-btn-text si-resend-btn" ${STATE.signin.resendTimer > 0 ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''} onclick="resendOtp()">${escape(t.resend)}</button>

        <div style="flex: 1; min-height: 20px;"></div>

        <div class="si-keypad">
          ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="si-key" onclick="typeOtp('${n}')">${n}</button>`).join('')}
          <button class="si-key blank"></button>
          <button class="si-key" onclick="typeOtp('0')">0</button>
          <button class="si-key" onclick="typeOtp('back')">
            <svg width="24" height="18" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3H7l-6 6 6 6h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/><line x1="18" y1="7" x2="12" y2="13"/><line x1="12" y1="7" x2="18" y2="13"/></svg>
          </button>
        </div>
      </div>
      <div class="si-foot" style="padding-top: 4px;">
        <div class="si-otp-foot">
          <span style="cursor: pointer;" onclick="showToast('${ko?'SMG 직원에게 전화':'Calling SMG support'}','ok')">☎ ${escape(t.help)}</span>
          <span onclick="STATE.signin.step='code';renderSignIn();" style="cursor: pointer;">· ${escape(t.wrong)}</span>
        </div>
      </div>
    </div>
  `;
}

function typeOtp(key) {
  if (key === 'back') {
    STATE.signin.otp = STATE.signin.otp.slice(0, -1);
  } else if (STATE.signin.otp.length < 6) {
    STATE.signin.otp += key;
  }
  renderSIOtp();
  if (STATE.signin.otp.length === 6) {
    setTimeout(() => {
      if (STATE.signin.otp === '000000') {
        showToast(isKo() ? '코드가 맞지 않아요' : 'Incorrect code', 'err');
        STATE.signin.otp = '';
        renderSIOtp();
      } else {
        STATE.signin.step = 'biometric';
        renderSIBiometric();
      }
    }, 400);
  }
}

function startResendTimer() {
  if (STATE.signin.resendInt) clearInterval(STATE.signin.resendInt);
  STATE.signin.resendInt = setInterval(() => {
    STATE.signin.resendTimer--;
    if (STATE.signin.resendTimer <= 0) {
      clearInterval(STATE.signin.resendInt);
      STATE.signin.resendTimer = 0;
    }
    if (STATE.signin.step !== 'otp' || !document.getElementById('signin').classList.contains('open')) return;
    const cd = document.querySelector('#signin .si-otp-countdown');
    if (cd) {
      const ko = isKo();
      cd.textContent = STATE.signin.resendTimer > 0
        ? (ko ? `${STATE.signin.resendTimer}초 후에 다시 보낼 수 있어요` : `You can resend in ${STATE.signin.resendTimer}s`)
        : '';
    }
    const btn = document.querySelector('#signin .si-resend-btn');
    if (btn && STATE.signin.resendTimer === 0) {
      btn.removeAttribute('disabled');
      btn.style.opacity = '';
      btn.style.cursor = '';
    }
  }, 1000);
}
function resendOtp() {
  if (STATE.signin.resendTimer > 0) return;
  STATE.signin.resendTimer = 28;
  renderSIOtp();
  startResendTimer();
  showToast(isKo() ? '문자를 다시 보냈어요' : 'Code re-sent', 'ok');
}

function finishSignIn(withFaceId) {

  showToast(ko ? (withFaceId ? 'Face ID 설정됨' : '환영해요') : (withFaceId ? 'Face ID enabled' : 'Welcome'), 'ok');
  setTimeout(() => { showTab('home'); }, 200);
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();
function init() {
  document.getElementById('fabLabel').textContent = isKo() ? '어머니께 전화' : 'Call Mom';
  document.getElementById('moodLabel').textContent = STATE.mood;
  // ?reset clears auth
  if (location.search.includes('reset')) {
    localStorage.removeItem('smg-cg-authed');
  }
  // Render home (behind the sign-in if it shows)
  showTab('home');
  // Show sign-in on first visit
  if (!localStorage.getItem('smg-cg-authed')) {
    showSignIn();
  }
}

function openFlow(name) {
  STATE.flow = name;
  renderCurrent();
  updateFab();
  document.getElementById('screen').scrollTop = 0;
}

RENDERERS.meds = function() {
  if (STATE.flow === 'refill') return renderMedsRefill();
  if (STATE.flow === 'remind') return renderMedsRemind();
  if (STATE.data === 'empty')   return renderTabEmpty('meds');
  if (STATE.data === 'loading') return renderTabLoading('meds');
  if (STATE.data === 'error')   return renderTabError('meds');
  return renderMedsPopulated();
};

function renderMedsPopulated() {
  const ko = isKo();

  // Weekly adherence bars — index 2 missed, index 6 today
  const days = ['M','T','W','T','F','S','S'];
  const adherence = days.map((d, i) => {
    const color = i === 2 ? 'var(--cg-watch)' : i === 6 ? 'var(--b-rule)' : 'var(--cg-ok)';
    return `
      <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="height: 32px; width: 100%; background: ${color}; border-radius: 4px;"></div>
        <div style="font-family: var(--font-mono); font-size: 9px; color: var(--b-ink-3);">${d}</div>
      </div>
    `;
  }).join('');

  // AM (all taken)
  const amMeds = [
    {name:'Metformin 500mg', time:'8:12 AM', taken: true},
    {name:'Lisinopril 10mg', time:'8:14 AM', taken: true},
    {name:'Vitamin D 1000 IU', time:'8:14 AM', taken: true},
  ];
  // PM (upcoming)
  const pmMeds = [
    {name:'Metformin 500mg', time:'7:00 PM', state: 'upcoming'},
  ];
  // Night (upcoming)
  const nightMeds = [
    {name:'Atorvastatin 20mg', time:'9:00 PM', state: 'upcoming'},
  ];

  const renderGroup = (timeLabel, timeLabelEn, meds, state) => {
    const stateLabel = state === 'taken'
      ? `<span style="font-family: var(--font-display-b); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--cg-ok); text-transform: uppercase;">${ko?'✓ 복용':'✓ TAKEN'}</span>`
      : state === 'missed'
      ? `<span style="font-family: var(--font-display-b); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--cg-attn); text-transform: uppercase;">${ko?'놓침':'MISSED'}</span>`
      : `<span style="font-family: var(--font-display-b); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--b-ink-3); text-transform: uppercase;">${ko?'예정':'UPCOMING'}</span>`;

    const rows = meds.map((m, i, a) => {
      const indicator = m.taken
        ? `<div style="width: 28px; height: 28px; border-radius: 50%; background: var(--cg-ok); color: #fff; display: grid; place-items: center; flex-shrink: 0; font-size: 14px; font-weight: 700;">✓</div>`
        : m.state === 'missed'
        ? `<div style="width: 28px; height: 28px; border-radius: 50%; background: var(--cg-attn); color: #fff; display: grid; place-items: center; flex-shrink: 0; font-size: 14px; font-weight: 700;">!</div>`
        : `<div style="width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 2px solid var(--b-rule); flex-shrink: 0;"></div>`;
      const nameStyle = m.taken
        ? 'color: var(--b-ink-3); text-decoration: line-through;'
        : 'color: var(--b-ink);';
      return `
        <div style="display: flex; align-items: center; gap: 14px; padding: 14px 16px; ${i < a.length-1 ? 'border-bottom: 1px solid var(--b-rule);' : ''}">
          ${indicator}
          <div style="flex: 1; font-size: 14px; font-weight: 500; ${nameStyle}">${escape(m.name)}</div>
          <div style="font-family: var(--font-mono); font-size: 11px; color: var(--b-ink-3);">${escape(m.time)}</div>
        </div>
      `;
    }).join('');

    return `
      <div>
        <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; padding: 0 2px;">
          <div class="tt-label" style="color: var(--b-ink-3);">${ko?timeLabel:timeLabelEn}</div>
          ${stateLabel}
        </div>
        <div class="card" style="padding: 0; border-radius: 16px; overflow: hidden;">${rows}</div>
      </div>
    `;
  };

  return `
    ${cgHeader({ title: ko?'어머니의 약':"Mom's medications", subtitle: ko?'오늘 · 5개 중 3개 복용':'Today · 3 of 5 taken' })}
    <div style="padding: 18px 20px 140px; display: flex; flex-direction: column; gap: 18px;">

      <!-- Weekly adherence strip (§7.1) -->
      <div class="card" style="border-radius: 16px; padding: 16px;">
        <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px;">
          <div class="tt-label" style="color: var(--b-ink-3);">${ko?'이번 주 복약률':'Weekly adherence'}</div>
          <div style="font-family: var(--font-display-b); font-size: 20px; font-weight: 600;">${ko?'6/7일 완벽':'6 of 7 days perfect'}</div>
        </div>
        <div style="display: flex; gap: 6px; align-items: flex-end;">${adherence}</div>
      </div>

      <!-- Med groups (§7.2) -->
      ${renderGroup('오전 8시', '8:00 AM', amMeds, 'taken')}
      ${renderGroup('오후 7시', '7:00 PM', pmMeds, 'upcoming')}
      ${renderGroup('자기 전 · 9시', 'Bedtime · 9:00 PM', nightMeds, 'upcoming')}

      <!-- Refill warning (§7.3) -->
      <div class="card peach" style="border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px;">
        <div style="width: 40px; height: 40px; border-radius: 10px; background: #fff; display: grid; place-items: center; font-family: var(--font-display-b); font-size: 18px; font-weight: 600; color: var(--cg-watch); flex-shrink: 0;">!</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 14px; font-weight: 600;">${ko?'Lisinopril · 3일치 남음':'Lisinopril · 3 days left'}</div>
          <div style="font-size: 11px; color: var(--b-ink-3); margin-top: 2px;">${ko?'어머니 대신 요청할 수 있어요':'You can request on her behalf'}</div>
        </div>
        <button style="padding: 10px 14px; border-radius: 10px; border: none; background: var(--b-emerald-deep); color: #fff; font-size: 12px; font-weight: 700; font-family: var(--font-sans-b); cursor: pointer;" onclick="openFlow('refill')">${ko?'리필 요청':'Request refill'}</button>
      </div>

      <!-- Persistent remind button (§7.4) -->
      <button class="btn btn-outline-primary" style="padding: 16px; border-radius: 14px; font-size: 15px;" onclick="openFlow('remind')">
        ◑ ${ko?'어머니께 알림 보내기':'Remind Mom'}
      </button>

    </div>
  `;
}

        <div class="vstack" style="gap: 8px;">

          }).join('')}

      <!-- Let Mom know toggle (§7.5.3) -->
      <div class="card peach" style="border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 12px;">

  STATE.flow = null;

function renderMedsRemind() {
  const ko = isKo();
  const methods = [
    {v:'app',   ko:'앱 알림 (추천)',    en:'In-app notification (recommended)'},
    {v:'sms',   ko:'문자 메시지',       en:'Text message'},

  ];
  const placeholder = ko
    ? '어머니, 저녁 약 드실 시간이에요 ♡ — 제니퍼'
    : 'Hi Mom, just a little reminder to take your evening meds. Love, Jennifer';

  return `

    <div style="padding: 18px 20px 160px; display: flex; flex-direction: column; gap: 22px;">

      <!-- Method picker (§7.6.1) -->
      <div>
        <div class="tt-label" style="color: var(--b-ink-3); margin-bottom: 10px;">${ko?'어떻게 알리시겠어요?':'How should we remind her?'}</div>
        <div class="card" style="padding: 0; border-radius: 14px; overflow: hidden;">
          ${methods.map((o, i, a) => {
            const sel = STATE.remind.method === o.v;
            return `
              <div onclick="STATE.remind.method='${o.v}'; renderCurrent();" style="cursor: pointer; display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: ${sel?'var(--b-emerald-soft)':'#fff'}; ${i < a.length-1?'border-bottom: 1px solid var(--b-rule);':''}">
                <div class="radio-circle ${sel?'sel':''}">${sel?'✓':''}</div>
                <div style="flex: 1; font-size: 15px; font-weight: 600; color: ${sel?'var(--b-emerald-deep)':'var(--b-ink)'};">${ko?escape(o.ko):escape(o.en)}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- Optional note (§7.6.2) -->
      <div>
        <div class="tt-label" style="color: var(--b-ink-3); margin-bottom: 10px;">${ko?'쪽지 (선택)':'Add a note (optional)'}</div>
        <textarea id="remindNote" style="width: 100%; background: #fff; border: 1px solid var(--b-rule); border-radius: 12px; padding: 14px; min-height: 90px; font-size: 14px; font-family: var(--font-sans-b); line-height: 1.5; color: var(--b-ink-2); outline: none; resize: vertical;" placeholder="${escape(placeholder)}"></textarea>
      </div>

    </div>

    <!-- Sticky action bar (§7.6.3) -->
    <div class="sticky-bar cols-2">
      <button class="btn" onclick="goBack()">${ko?'취소':'Cancel'}</button>
      <button class="btn btn-primary" onclick="submitRemind()">${ko?'알림 보내기':'Send reminder'}</button>
    </div>
  `;
}

function submitRemind() {
  const note = (document.getElementById('remindNote') || {}).value || '';
  STATE.remind.note = note;
  STATE.flow = null;
  renderCurrent();
  updateFab();
  showToast(isKo()?'알림을 보냈어요':'Reminder sent', 'ok');
}

    <div class="state-block">
      <div class="state-glyph sage">${d.glyph}</div>
      <div class="state-title">${ko?escape(d.titleKo):escape(d.titleEn)}</div>
      <div class="state-body">${ko?escape(d.bodyKo):escape(d.bodyEn)}</div>
    </div>
  `;
}

function renderTabLoading(tab) {
  const ko = isKo();
  const titles = {
    meds: { ko:'어머니의 약',        en:"Mom's medications" },
    visits:{ko:'어머니의 진료',       en:"Mom's visits" },
    labs: { ko:'어머니의 검사 결과',   en:"Mom's labs" },
    mom:  { ko:'어머니',             en:'Mom' },
  };
  const t = titles[tab];
  return `
    ${cgHeader({ title: ko?t.ko:t.en })}
    <div style="padding: 20px 20px 120px;">
      <div class="skel-card"><div class="skel-bar"></div><div class="skel-bar thin"></div><div class="skel-bar thin short"></div></div>
      <div class="skel-card"><div class="skel-bar"></div><div class="skel-bar thin"></div><div class="skel-bar thin short"></div></div>
      <div class="skel-card"><div class="skel-bar"></div><div class="skel-bar thin"></div><div class="skel-bar thin short"></div></div>
      <div style="text-align: center; color: var(--b-ink-3); font-size: 13px; margin-top: 12px;">${ko?'불러오는 중이에요…':'Loading…'}</div>
    </div>
  `;
}

function renderTabError(tab) {
  const ko = isKo();
  const defs = {
    meds:   { titleKo:'약 정보를 불러올 수 없어요',  titleEn:"Can't load medications",   bodyKo:'잠시 후 다시 시도할게요.',                                   bodyEn:"We'll try again in a moment.",                                 headerKo:"어머니의 약",       headerEn:"Mom's medications" },
    visits: { titleKo:'진료 일정을 불러올 수 없어요', titleEn:"Can't load visits",        bodyKo:'연결이 회복되면 다시 시도할게요. 병원에 바로 전화할 수도 있어요.', bodyEn:"We'll retry as soon as the connection returns.",              headerKo:"어머니의 진료",     headerEn:"Mom's visits" },
    labs:   { titleKo:'검사 결과를 불러올 수 없어요',  titleEn:"Can't load labs",          bodyKo:'잠시 후 다시 시도해주세요.',                                  bodyEn:"Please try again in a moment.",                               headerKo:"어머니의 검사 결과", headerEn:"Mom's labs" },
    mom:    { titleKo:'프로필을 불러올 수 없어요',    titleEn:"Can't load profile",        bodyKo:'연결이 회복되면 다시 시도할게요.',                            bodyEn:"We'll retry as soon as the connection returns.",              headerKo:"어머니",             headerEn:"Mom" },
  };
  const d = defs[tab];
  return `
    ${cgHeader({ title: ko?d.headerKo:d.headerEn })}
    <div class="state-block">
      <div class="state-glyph danger">!</div>
      <div class="state-title">${ko?escape(d.titleKo):escape(d.titleEn)}</div>
      <div class="state-body">${ko?escape(d.bodyKo):escape(d.bodyEn)}</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 320px; margin-top: 8px;">
        <button class="btn" onclick="STATE.data='populated';renderCurrent();updateFab()">${ko?'다시 시도':'Try again'}</button>
        <button class="btn btn-primary" onclick="callMom()">☎ ${ko?'전화하기':'Call Mom'}</button>
      </div>
    </div>
  `;
}

</script>
</body>
</html>

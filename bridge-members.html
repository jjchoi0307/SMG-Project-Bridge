<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge Members</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #F5F5F2;
    --primary: #1A6B5F;
    --primary-soft: #E8F4F2;
    --primary-dark: #0F4D43;
    --accent: #E07B39;
    --text: #111827;
    --text-sec: #6B7280;
    --border: #E5E7EB;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #B8B8B4;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 32px 20px;
  }

  .phone {
    width: 393px;
    height: 852px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.28), 0 8px 24px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Chooser screen (same pattern as .signup-screen) ── */
  .chooser-screen {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #0A3D35 0%, #1A6B5F 55%, #2A8C7E 100%);
    display: flex; flex-direction: column;
    overflow-y: auto; padding: 44px 28px 40px;
  }
  .chooser-screen::-webkit-scrollbar { display: none; }


  /* ── Logo ── */
  .smg-logo-light { height: 62px; filter: brightness(0) invert(1); opacity: 0.9; display: block; }

  /* ── Language toggle (dark, matches su-lang-toggle exactly) ── */
  .su-lang-toggle {
    display: flex; border-radius: 8px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.18); flex-shrink: 0;
  }
  .su-lang-btn {
    padding: 6px 14px; font-size: 12px; font-weight: 600;
    border: none; background: transparent; color: rgba(255,255,255,0.5);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .su-lang-btn.active { background: rgba(255,255,255,0.92); color: #0A3D35; }

  /* ── Title + subtitle (matches su-title / su-subtitle) ── */
  .su-title {
    font-size: 26px; font-weight: 800; color: #fff;
    letter-spacing: -0.5px; margin-bottom: 4px;
  }
  .su-subtitle {
    font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 28px; line-height: 1.5;
  }

  /* ── Role cards (dark version of row-card) ── */
  .role-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px;
    padding: 15px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.12s, background 0.15s;
  }
  .role-card:hover  { background: rgba(255,255,255,0.12); }
  .role-card:active { transform: scale(0.984); background: rgba(255,255,255,0.16); }

  /* Icon box (matches row-icon sizing/shape, adapted for dark bg) */
  .role-icon {
    width: 40px; height: 40px; border-radius: 11px;
    background: rgba(255,255,255,0.14);
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
  }

  .role-label  { font-size: 16px; font-weight: 600; color: #fff; flex: 1; }
  .role-sub    { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .role-chevron { color: rgba(255,255,255,0.35); font-size: 20px; font-weight: 300; flex-shrink: 0; }

  /* ── Divider label ── */
  .su-section-label {
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35);
    letter-spacing: 0.8px; text-transform: uppercase;
    margin-bottom: 14px; margin-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;
  }

  /* ── Home indicator ── */
  .home-bar { display: flex; justify-content: center; padding: 8px 0 0; }
  .home-bar div { width: 134px; height: 5px; border-radius: 5px; background: rgba(255,255,255,0.25); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fu  { animation: fadeUp 0.35s ease both; }
  .fu1 { animation: fadeUp 0.35s ease 0.07s both; }
  .fu2 { animation: fadeUp 0.35s ease 0.14s both; }
  .fu3 { animation: fadeUp 0.35s ease 0.21s both; }
  .fu4 { animation: fadeUp 0.35s ease 0.28s both; }
</style>
</head>
<body>
<div class="phone">
  <div class="chooser-screen">

    <!-- ── Header: logo left · label + lang toggle right ── -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;" class="fu">
      <img src="smg.logo.transparent.v1.png" alt="SMG" class="smg-logo-light">
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
        <div style="text-align:right;">
          <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.5px;font-family:'Inter',-apple-system,sans-serif;"
            data-en="BRIDGE MEMBERS" data-ko="브리지 멤버스">BRIDGE MEMBERS</div>
          <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);font-family:'Inter',-apple-system,sans-serif;"
            data-en="SMG Member Portal" data-ko="SMG 회원 포털">SMG Member Portal</div>
        </div>
        <div class="su-lang-toggle">
          <button class="su-lang-btn active" id="su-btn-en" onclick="setSuLang('en')">EN</button>
          <button class="su-lang-btn" id="su-btn-ko" onclick="setSuLang('ko')">한국어</button>
        </div>
      </div>
    </div>

    <!-- ── Title + cards ── -->
    <div>
      <div class="su-title fu1" data-en="Welcome to Bridge." data-ko="Bridge에 오신 걸 환영합니다.">Welcome to Bridge.</div>
      <div class="su-subtitle fu1"
        data-en="Select how you're joining today."
        data-ko="본인에게 맞는 서비스를 선택해주세요.">Select how you're joining today.</div>

      <a class="role-card fu2" href="bridge-patient.html">
        <div class="role-icon">🏥</div>
        <div style="flex:1;">
          <div class="role-label" data-en="I'm an SMG member" data-ko="SMG 회원입니다">I'm an SMG member</div>
          <div class="role-sub"
            data-en="Manage your health, medications, and care reminders."
            data-ko="건강, 약, 케어 알림을 직접 관리하세요.">Manage your health, medications, and care reminders.</div>
        </div>
        <div class="role-chevron">›</div>
      </a>

      <a class="role-card fu3" href="bridge-caregiver.html">
        <div class="role-icon">👨‍👩‍👧</div>
        <div style="flex:1;">
          <div class="role-label" data-en="I'm a caregiver" data-ko="보호자입니다">I'm a caregiver</div>
          <div class="role-sub"
            data-en="Help a family member with their care and appointments."
            data-ko="가족의 케어와 예약을 함께 도와주세요.">Help a family member with their care and appointments.</div>
        </div>
        <div class="role-chevron">›</div>
      </a>
    </div>

    <!-- ── Home indicator ── -->
    <div class="home-bar fu4"><div></div></div>

  </div>
</div>

<script>
  function setSuLang(lang) {
    // Toggle button states
    document.getElementById('su-btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('su-btn-ko').classList.toggle('active', lang === 'ko');

    // Swap all data-en / data-ko text nodes
    document.querySelectorAll('[data-en]').forEach(function(el) {
      el.textContent = lang === 'ko'
        ? (el.getAttribute('data-ko') || el.getAttribute('data-en'))
        : el.getAttribute('data-en');
    });
  }
</script>
</body>
</html>
